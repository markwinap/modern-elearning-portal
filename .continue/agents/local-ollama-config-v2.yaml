# Continue config.yaml — Trinity eLearning Portal v2
# Reference: https://docs.continue.dev/reference
# Upgraded for Copilot-level performance with hybrid local + cloud model strategy

name: eLearning — Full Stack Agent
version: 2.0.0
schema: v1

# ─────────────────────────────────────────────
# MODELS
# ─────────────────────────────────────────────
models:

  # ── TIER 1: FRONTIER AGENT (replaces Copilot for complex reasoning) ──────
  - name: Claude Sonnet 4.6 (Agent)
    provider: anthropic
    model: claude-sonnet-4-6
    apiKey: $ANTHROPIC_API_KEY
    roles:
      - chat
      - edit
      - apply
    capabilities:
      - tool_use
      - image_input
    defaultCompletionOptions:
      maxTokens: 8192
      temperature: 0.1
    chatOptions:
      baseAgentSystemMessage: |
        You are an expert full-stack TypeScript engineer on the Trinity eLearning Portal.
        Stack: Next.js 15 App Router, React 19, tRPC v11, Drizzle ORM, better-auth v1.3, Ant Design 6.
        Core rules from AGENTS.md always apply:
        - Never use `any` or escape hatches. Propagate types end-to-end.
        - Server Components are the default. Add "use client" only for browser APIs, event handlers, or React state.
        - All Ant Design components must be in Client Components — never in Server Components.
        - All data fetching via tRPC (no REST routes except /api/auth and file uploads).
        - Drizzle query builder only, never raw SQL. Validate all inputs with Zod.
        - All mutations use protectedProcedure. Always verify ownership server-side.

  # ── TIER 2: LOCAL FALLBACK (offline / saving API credits) ───────────────
  - name: Qwen3 Coder 30B (Local)
    provider: ollama
    model: qwen3-coder:30b
    apiBase: http://192.168.1.226:11434
    roles:
      - chat
      - edit
    capabilities:
      - tool_use
    defaultCompletionOptions:
      contextLength: 32768
      maxTokens: 4096
      temperature: 0.1
      keepAlive: 3600

  # ── TIER 3: LOCAL PROXY (apply role — fast deterministic edits) ──────────
  - name: Qwen2.5 Coder 14B (Apply)
    provider: openai
    model: qwen2.5-Coder:14b
    apiBase: http://localhost:3000/api
    # Replace with your actual JWT — store in env var for security
    apiKey: $LOCAL_PROXY_API_KEY
    roles:
      - edit
      - apply
    capabilities:
      - tool_use
    defaultCompletionOptions:
      contextLength: 16384
      temperature: 0.0

  # ── AUTOCOMPLETE (fast local, no API cost) ───────────────────────────────
  - name: Autocomplete
    provider: ollama
    model: qwen2.5-coder:1.5b
    apiBase: http://192.168.1.226:11434
    roles:
      - autocomplete
    autocompleteOptions:
      debounceDelay: 150
      maxPromptTokens: 2048
      onlyMyCode: true
      useRecentlyEdited: true
      useRecentlyOpened: true
      transform: true

  # ── EMBEDDINGS (local, needed for codebase search) ──────────────────────
  - name: Nomic Embeddings
    provider: ollama
    model: nomic-embed-text
    apiBase: http://192.168.1.226:11434
    roles:
      - embed
    embedOptions:
      maxChunkSize: 512
      maxBatchSize: 64

  # ── REASONING (architecture decisions, complex debugging) ────────────────
  - name: DeepSeek R1 14B (Reasoning)
    provider: ollama
    model: deepseek-r1:14b
    apiBase: http://192.168.1.226:11434
    roles:
      - chat
    capabilities:
      - tool_use          # Must be explicit for agent compatibility
    defaultCompletionOptions:
      reasoning: true
      contextLength: 16384
      temperature: 0.6
      keepAlive: 1800

  # ── WRITING (docs, commit messages, PR descriptions) ─────────────────────
  - name: Gemma3 12B (Writing)
    provider: ollama
    model: gemma3:12b
    apiBase: http://192.168.1.226:11434
    roles:
      - chat
    defaultCompletionOptions:
      contextLength: 8192
      keepAlive: 1800

# ─────────────────────────────────────────────
# MCP SERVERS
# ─────────────────────────────────────────────
mcpServers:

  - name: filesystem
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-filesystem"
      - /Users/markwinap/repos/trinity-elearning-portal

  - name: github
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-github"
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: $GITHUB_TOKEN

  - name: git
    command: uvx
    args:
      - mcp-server-git
      - --repository
      - /Users/markwinap/repos/trinity-elearning-portal

  - name: playwright
    command: npx
    args:
      - -y
      - "@playwright/mcp"

  - name: memory
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-memory"

  - name: antd
    command: npx
    args:
      - -y
      - "@ant-design/cli"
      - mcp

  - name: travily
    command: npx
    args:
      - -y
      - tavily-mcp@0.1.4
    env:
      TAVILY_API_KEY: $TAVILY_API_KEY

# ─────────────────────────────────────────────
# RULES (injected into every agent system message)
# ─────────────────────────────────────────────
rules:
  - uses: file://./AGENTS.md
  - uses: file://./.github/instructions/antd.instructions.md
  - uses: file://./.github/instructions/auth.instructions.md
  - uses: file://./.github/instructions/drizzle.instructions.md
  - uses: file://./.github/instructions/nextjs.instructions.md
  - uses: file://./.github/instructions/tests.instructions.md
  - uses: file://./.github/instructions/trpc.instructions.md
  # Add these new files — see guide for content
  - uses: file://./.continue/rules/project-architecture.md
  - uses: file://./.continue/rules/current-work.md

# ─────────────────────────────────────────────
# PROMPTS (slash commands)
# ─────────────────────────────────────────────
prompts:
  - uses: file://./.github/prompts/add-antd-form.prompt.md
  - uses: file://./.github/prompts/add-auth-flow.prompt.md
  - uses: file://./.github/prompts/add-page.prompt.md
  - uses: file://./.github/prompts/add-skeleton-loading.prompt.md
  - uses: file://./.github/prompts/add-trpc-router.prompt.md
  - uses: file://./.github/prompts/code-review.prompt.md
  - uses: file://./.github/prompts/db-migration.prompt.md
  - uses: file://./.github/prompts/add-theme-color.prompt.md

# ─────────────────────────────────────────────
# CONTEXT PROVIDERS
# ─────────────────────────────────────────────
context:
  - provider: file
  - provider: code
  - provider: terminal
  - provider: diff
  - provider: repo-map
  - provider: mcp
