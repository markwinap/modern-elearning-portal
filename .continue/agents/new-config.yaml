# Rules — always-on project conventions
# https://docs.continue.dev/customize/deep-dives/rules
rules:
  - uses: file://../../AGENTS.md
  - uses: file://../../.github/instructions/antd.instructions.md
  - uses: file://../../.github/instructions/auth.instructions.md
  - uses: file://../../.github/instructions/drizzle.instructions.md
  - uses: file://../../.github/instructions/nextjs.instructions.md
  - uses: file://../../.github/instructions/tests.instructions.md
  - uses: file://../../.github/instructions/trpc.instructions.md

# Prompts — slash commands available in chat
# https://docs.continue.dev/customize/deep-dives/prompts
prompts:
  - uses: file://../../.github/prompts/add-antd-form.prompt.md
  - uses: file://../../.github/prompts/add-auth-flow.prompt.md
  - uses: file://../../.github/prompts/add-page.prompt.md
  - uses: file://../../.github/prompts/add-skeleton-loading.prompt.md
  - uses: file://../../.github/prompts/add-trpc-router.prompt.md
  - uses: file://../../.github/prompts/code-review.prompt.md
  - uses: file://../../.github/prompts/db-migration.prompt.md

# Context providers
# https://docs.continue.dev/customize/deep-dives/context
context:
  - provider: file
  - provider: code
  - provider: terminal
  - provider: diff
  - provider: repo-map
