name: MCPServers
version: 0.0.1
schema: v1
mcpServers:
  - name: travily
    command: npx
    args:
      - -y
      - tavily-mcp@0.1.4
    env:
      TAVILY_API_KEY: ${TAVILY_API_KEY}
  - name: filesystem
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-filesystem"
      - /Users/markwinap/repos/trinity-elearning-portal
  - name: github
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-github"
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: ${GITHUB_TOKEN}
  - name: playwright
    command: npx
    args:
      - -y
      - "@playwright/mcp"
  - name: git
    command: uvx
    args:
      - mcp-server-git
      - --repository
      - /Users/markwinap/repos/trinity-elearning-portal
  - name: memory
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-memory"