name: Bug Report
description: Report a bug in the application
title: '[Bug]: '
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: Describe what you expected...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
      placeholder: Describe what actually happened...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Details about your environment
      placeholder: |
        - OS: [e.g., Windows, macOS, Linux]
        - Browser: [e.g., Chrome, Safari, Firefox]
        - Node.js version: [e.g., 20.x]
        - Package manager: [e.g., pnpm 10.x]
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Error Logs / Screenshots
      description: Any error logs or screenshots that might help
      placeholder: Paste logs or describe screenshots...
    validations:
      required: false

  - type: dropdown
    id: ai-generated
    attributes:
      label: AI-Generated Code
      description: Was any part of this bug related to AI-generated code?
      options:
        - 'No'
        - 'Yes - Windsurf/Cascade'
        - 'Yes - GitHub Copilot'
        - 'Yes - Other AI tool'
    validations:
      required: false
